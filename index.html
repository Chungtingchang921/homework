<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 探索之境 | Janu Tokyo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* CSS 部分：負責裝潢與動畫 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');

        :root {
            --janu-bg: #F9F7F2;        /* 品牌米色背景 */
            --janu-blue: #003153;      /* 你要求的深藍色標題 */
            --janu-text: #2D2926;      /* 一般文字炭灰色 */
            --janu-accent: #C5A47E;    /* 暖金裝飾色 */
        }

        body {
            background-color: var(--janu-bg);
            color: var(--janu-text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden; /* 防止出現捲軸，保持畫面純淨 */
            height: 100vh;
            user-select: none; /* 防止使用者選取文字，增加應用程式感 */
        }

        /* 藝術壁畫區容器 */
        .mural-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80vh;
            /* 背景結合了：漸層遮罩 + 自然森林圖片 */
            background-image: 
                linear-gradient(to bottom, rgba(249, 247, 242, 0.2), var(--janu-bg)),
                url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transition: background-color 0.5s ease; /* 讓 JS 改變背景色時平滑過渡 */
        }

        /* 畫布紋理效果 */
        .mural-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/canvas-orange.png');
            opacity: 0.15;
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        /* 石材基座：使用 CSS 裁切路徑製作梯形 */
        .stone-pedestal {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 25vh;
            background: linear-gradient(135deg, #E0DDD5 0%, #D4D1C8 100%);
            clip-path: polygon(6% 0%, 94% 0%, 100% 100%, 0% 100%);
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 -20px 60px rgba(0,0,0,0.03);
        }

        /* 水波紋動畫樣式 */
        .ripple-effect {
            position: fixed;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            background-color: var(--janu-blue); /* 波紋使用深藍色 */
            z-index: 10;
            animation: ripple-animation 1.5s cubic-bezier(0, 0, 0.1, 1) forwards;
        }

        @keyframes ripple-animation {
            from { width: 0px; height: 0px; opacity: 0.25; }
            to { width: 500px; height: 500px; opacity: 0; }
        }

        /* 進場淡入動畫 */
        .fade-up {
            animation: fadeUp 2.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 跟隨滑鼠的微光 */
        #glow {
            position: fixed;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(0, 49, 83, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="glow"></div>

    <main class="mural-container" id="mural">
        <div class="text-center z-10 fade-up px-6">
            <div class="janu-logo text-[3.5rem] md:text-[5.5rem] tracking-[0.45em] font-[200] mb-8">JANU</div>
            
            <div class="error-message text-[1.6rem] tracking-[0.2em] italic mb-12" style="color: var(--janu-blue); font-family: 'Playfair Display', serif;">
                404 — 路徑暫失
            </div>
            
            <p class="text-[16px] md:text-2xl tracking-[0.25em] leading-relaxed max-w-3xl mx-auto opacity-50 font-light uppercase">
                本網站目前處於維護狀態，相關人員正進行緊急維護，<br class="hidden md:block">
                將於不久後重新開放，造成您的不變深感抱歉
            </p>
        </div>
    </main>

    <nav class="stone-pedestal">
        <div class="flex flex-col items-center gap-10">
            <a href="/" class="px-14 py-4 border border-stone-300 text-[11px] tracking-[0.5em] uppercase hover:bg-stone-800 hover:text-white transition-all duration-1000 shadow-sm">
                重返首頁
            </a>
            <button onclick="window.history.back()" class="text-[10px] tracking-[0.4em] opacity-30 hover:opacity-100 transition-opacity">
                BACK
            </button>
        </div>
    </nav>

    <footer class="absolute bottom-10 w-full text-center z-20">
        <p class="text-[11px] tracking-[0.7em] opacity-30 uppercase font-light">Where Life & Soul Align</p>
    </footer>

    <script>
        const glow = document.getElementById('glow');
        const mural = document.getElementById('mural');
        
        // 1. 滑鼠移動互動 (光暈與背景視差)
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // 讓光暈跟隨滑鼠
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';

            // 計算背景視差：讓背景隨滑鼠微幅位移
            const moveX = (x - window.innerWidth / 2) / 120;
            const moveY = (y - window.innerHeight / 2) / 120;
            mural.style.backgroundPosition = `calc(50% + ${moveX}px) calc(40% + ${moveY}px)`;
        });

        // 2. 點擊產生水波紋
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple-effect';
            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            document.body.appendChild(ripple);
            
            // 1.5 秒後移除波紋元素，節省效能
            setTimeout(() => { ripple.remove(); }, 1500);
        });

        // 3. 環境呼吸燈動畫：自動改變背景透明度
        let lightVal = 0.35; // 起始亮度
        let growing = true;  // 狀態開關
        
        function animateAmbient() {
            // 邏輯：在 0.25 到 0.5 之間循環
            if (growing) {
                lightVal += 0.001;
                if (lightVal >= 0.5) growing = false;
            } else {
                lightVal -= 0.001;
                if (lightVal <= 0.25) growing = true;
            }
            
            // 套用數值到背景色 (RGBA 模式，最後一碼是透明度)
            mural.style.backgroundColor = `rgba(232, 226, 217, ${lightVal})`;
            
            // 請求下一幀動畫，產生無窮循環
            requestAnimationFrame(animateAmbient);
        }

        // 當網頁完全載入後開始執行呼吸動畫
        window.onload = animateAmbient;
    </script>
</body>
</html>
