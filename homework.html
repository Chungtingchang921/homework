<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 探索之境 | Janu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');

        :root {
            --janu-bg: #F9F7F2;        /* 明亮米色背景 */
            --janu-text: #2D2926;      /* 深炭灰文字 */
            --janu-mural-light: #E8E2D9; /* 淺沙色壁畫基底 */
            --janu-accent: #C5A47E;    /* 暖金細節 */
            --janu-blue: #003153;      /* 普魯士深藍色 */
        }

        body {
            background-color: var(--janu-bg);
            color: var(--janu-text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        /* 強化層次感的自然意象壁畫容器 */
        .mural-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80vh;
            /* 回歸自然：霧氣森林意象 */
            background-image: 
                linear-gradient(to bottom, rgba(249, 247, 242, 0.2), var(--janu-bg)),
                url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            filter: contrast(0.9) sepia(0.1) brightness(1.05);
        }

        /* 畫布質感疊加 */
        .mural-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/canvas-orange.png');
            opacity: 0.15;
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        /* 微妙的都會剪影 (東京鐵塔線條) */
        .tower-line {
            position: absolute;
            bottom: 20%;
            right: 10%;
            height: 40%;
            width: 1px;
            background: linear-gradient(to top, var(--janu-accent), transparent);
            opacity: 0.3;
            pointer-events: none;
        }

        /* 石材基座 */
        .stone-pedestal {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 25vh;
            background: linear-gradient(135deg, #E0DDD5 0%, #D4D1C8 100%);
            clip-path: polygon(6% 0%, 94% 0%, 100% 100%, 0% 100%);
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 -20px 60px rgba(0,0,0,0.03);
        }

        /* 水波紋樣式 */
        .ripple-effect {
            position: fixed;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            background-color: var(--janu-blue); /* 水波紋同步改為藍色系以維持和諧 */
            z-index: 5;
            animation: ripple-animation 1.5s cubic-bezier(0, 0, 0.1, 1) forwards;
        }

        @keyframes ripple-animation {
            from { width: 0px; height: 0px; opacity: 0.25; }
            to { width: 500px; height: 500px; opacity: 0; }
        }

        /* 字體與標題 */
        .janu-logo {
            font-size: clamp(3.5rem, 10vw, 5.5rem);
            letter-spacing: 0.45em;
            font-weight: 200;
            opacity: 0.9;
            text-indent: 0.45em;
            margin-bottom: 2rem;
            color: var(--janu-text);
            text-shadow: 0 5px 25px rgba(255,255,255,0.4);
        }

        /* 修改後的深藍色文字 */
        .error-message {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.6rem;
            letter-spacing: 0.2em;
            opacity: 1;
            color: var(--janu-blue);
        }

        .fade-up {
            animation: fadeUp 2.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #glow {
            position: fixed;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(0, 49, 83, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <div id="glow"></div>

    <!-- 背景自然壁畫區 -->
    <div class="mural-container" id="mural">
        <div class="tower-line"></div>
        
        <div class="text-center z-10 fade-up px-6">
            <div class="janu-logo">JANU</div>
            <div class="error-message mb-12">404 — 路徑暫失</div>
            
            <p class="text-[16px] md:text-2xl tracking-[0.2em] leading-relaxed max-w-3xl mx-auto opacity-50 font-light uppercase">
                本網站目前處於維護狀態，相關人員正進行緊急維護，<br class="hidden md:block">
                將於不久後重新開放，造成您的不變深感抱歉
            </p>
        </div>
    </div>

    <!-- 石材基座區 -->
    <div class="stone-pedestal">
        <div class="flex flex-col items-center gap-10">
            <a href="/" class="px-14 py-4 border border-stone-300 text-[11px] tracking-[0.5em] uppercase hover:bg-stone-800 hover:text-white transition-all duration-1000 shadow-sm">
                重返首頁
            </a>
            <button onclick="window.history.back()" class="text-[10px] tracking-[0.4em] opacity-30 hover:opacity-100 transition-opacity">
                BACK
            </button>
        </div>
    </div>

    <!-- 頁尾 -->
    <footer class="absolute bottom-10 w-full text-center z-20">
        <p class="text-[11px] tracking-[0.7em] opacity-30 uppercase font-light">
            Where Life & Soul Align
        </p>
    </footer>

    <script>
        const glow = document.getElementById('glow');
        const logo = document.querySelector('.janu-logo');
        const mural = document.getElementById('mural');

        // 互動效果：光暈與背景微視差
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // 1. 光暈跟隨
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';

            // 2. Logo 微位移
            logo.style.transform = `translate(${(x - centerX) / 80}px, ${(y - centerY) / 80}px)`;

            // 3. 背景圖片微位移
            const moveX = (x - centerX) / 120;
            const moveY = (y - centerY) / 120;
            mural.style.backgroundPosition = `calc(50% + ${moveX}px) calc(40% + ${moveY}px)`;
        });

        // 點擊水波紋效果
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple-effect';
            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1500);
        });

        // 呼吸光影效果
        let lightVal = 0.35;
        let grow = true;
        function animateAmbient() {
            if (grow) {
                lightVal += 0.001;
                if (lightVal >= 0.5) grow = false;
            } else {
                lightVal -= 0.001;
                if (lightVal <= 0.25) grow = true;
            }
            mural.style.backgroundColor = `rgba(232, 226, 217, ${lightVal})`;
            requestAnimationFrame(animateAmbient);
        }

        window.onload = () => {
            animateAmbient();
        };
    </script>
</body>
</html>
