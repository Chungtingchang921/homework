<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 探索之境 | Janu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');

        :root {
            --janu-bg: #F9F7F2;        /* 明亮米色背景 */
            --janu-text: #2D2926;      /* 深炭灰文字 */
            --janu-mural-light: #E8E2D9; /* 淺沙色壁畫 */
            --janu-accent: #C5A47E;    /* 暖金細節 */
        }

        body {
            background-color: var(--janu-bg);
            color: var(--janu-text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            user-select: none; /* 避免文字選取干擾視覺 */
        }

        /* 模擬照片中的壁畫背光效果 */
        .mural-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 75vh;
            background: linear-gradient(to bottom, rgba(232, 226, 217, 0.4), var(--janu-bg)),
                        url('https://www.transparenttextures.com/patterns/canvas-orange.png');
            background-color: var(--janu-mural-light);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* 樹影裝飾 */
        .tree-silhouette {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            filter: blur(2px);
            pointer-events: none;
            color: var(--janu-accent);
        }

        /* 石材基座 */
        .stone-pedestal {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 65%;
            height: 22vh;
            background: #E0DDD5;
            clip-path: polygon(8% 0%, 92% 0%, 100% 100%, 0% 100%);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.05);
            z-index: 3;
            display: flex;
            justify-content: center;
        }

        /* 盆栽圖標 */
        .bonsai {
            position: absolute;
            top: -65px;
            width: 90px;
            height: 90px;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 水波紋樣式 */
        .ripple-effect {
            position: fixed;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            background-color: var(--janu-accent);
            opacity: 0.3;
            z-index: 5;
            animation: ripple-animation 1.2s cubic-bezier(0, 0, 0.2, 1) forwards;
        }

        @keyframes ripple-animation {
            from {
                width: 0px;
                height: 0px;
                opacity: 0.4;
            }
            to {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }

        /* 字體樣式 */
        .janu-logo {
            font-size: clamp(3rem, 10vw, 5.5rem);
            letter-spacing: 0.45em;
            font-weight: 200;
            opacity: 0.9;
            text-indent: 0.45em;
            margin-bottom: 1.5rem;
            color: var(--janu-text);
        }

        .error-message {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.3rem;
            letter-spacing: 0.15em;
            opacity: 0.7;
        }

        /* 動畫 */
        .fade-up {
            animation: fadeUp 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(197, 164, 126, 0.08) 0%, rgba(249, 247, 242, 0) 70%);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

    <div id="glow"></div>

    <!-- 背景區 -->
    <div class="mural-container">
        <!-- 樹木剪影 -->
        <svg class="tree-silhouette" viewBox="0 0 800 400" preserveAspectRatio="none">
            <path d="M50 400 Q150 150 250 400 T450 400 T650 400" fill="none" stroke="currentColor" stroke-width="0.5" />
            <circle cx="250" cy="180" r="120" fill="currentColor" opacity="0.05"/>
            <circle cx="550" cy="220" r="100" fill="currentColor" opacity="0.05"/>
        </svg>

        <div class="text-center z-10 fade-up px-6">
            <div class="janu-logo">JANU</div>
            <div class="error-message mb-12">404 — 路徑暫失</div>
            
            <p class="text-[16px] md:text-xl tracking-[0.2em] leading-relaxed max-w-2xl mx-auto opacity-40 font-light uppercase">
                本網站目前處於維護狀態，相關人員正進行緊急維護，<br class="hidden md:block">
                將於不久後重新開放，造成您的不便深感抱歉
            </p>
        </div>
    </div>

    <!-- 基座區 -->
    <div class="stone-pedestal">
        <div class="bonsai">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M35 85 C35 75 65 75 65 85" stroke="#8C887E" stroke-width="1.5"/>
                <path d="M50 78 L50 65 L42 55" stroke="#5C5850" stroke-width="2"/>
                <circle cx="42" cy="50" r="18" fill="#5D6D50" opacity="0.6"/>
                <circle cx="62" cy="60" r="14" fill="#6D7D60" opacity="0.5"/>
                <circle cx="52" cy="40" r="12" fill="#4D5D40" opacity="0.7"/>
            </svg>
        </div>
        
        <div class="mt-14 flex flex-col items-center gap-8">
            <a href="/" class="px-12 py-3.5 border border-stone-300 text-[10px] tracking-[0.4em] uppercase hover:bg-stone-800 hover:text-white transition-all duration-700">
                重返首頁
            </a>
            <button onclick="window.history.back()" class="text-[10px] tracking-[0.3em] opacity-30 hover:opacity-100 transition-opacity">
                BACK
            </button>
        </div>
    </div>

    <!-- 頁尾：已更新標語 -->
    <footer class="absolute bottom-8 w-full text-center z-20">
        <p class="text-[9px] tracking-[0.5em] opacity-30 uppercase font-light">
            Where Life & Soul Align
        </p>
    </footer>

    <script>
        const glow = document.getElementById('glow');
        const logo = document.querySelector('.janu-logo');

        // 滑鼠移動光暈效果
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';

            const moveX = (x - window.innerWidth / 2) / 80;
            const moveY = (y - window.innerHeight / 2) / 80;
            logo.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        // 點擊水波紋效果
        document.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple-effect';
            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            
            document.body.appendChild(ripple);
            
            // 動畫結束後移除元素
            setTimeout(() => {
                ripple.remove();
            }, 1200);
        });

        // 模擬溫和的光影脈動
        let lightVal = 0.4;
        let grow = true;
        
        function animateAmbient() {
            const mural = document.querySelector('.mural-container');
            if (grow) {
                lightVal += 0.0015;
                if (lightVal >= 0.55) grow = false;
            } else {
                lightVal -= 0.0015;
                if (lightVal <= 0.35) grow = true;
            }
            mural.style.background = `linear-gradient(to bottom, rgba(232, 226, 217, ${lightVal}), rgba(249, 247, 242, 1)), url('https://www.transparenttextures.com/patterns/canvas-orange.png')`;
            requestAnimationFrame(animateAmbient);
        }

        window.onload = () => {
            animateAmbient();
        };
    </script>
</body>
</html>
